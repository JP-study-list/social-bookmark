<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>社群收藏庫</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="收藏庫">
<meta name="theme-color" content="#b8860b">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f3; --surface: #fff; --border: #e0e0e0;
    --text: #1a1a1a; --text2: #666; --text3: #999;
    --gold: #b8860b; --section: #888;
    --input-bg: #fff; --chip-on: #b8860b; --chip-on-text: #fff;
    --link: #3b6fb5; --unread: #2f8f5b; --danger: #c25656;
  }
  body.dark {
    --bg: #111110; --surface: #1c1c1a; --border: #2e2e2b;
    --text: #f0ede8; --text2: #a8a69e; --text3: #777;
    --gold: #d4a94e; --section: #aaa;
    --input-bg: #191917; --chip-on: #d4a94e; --chip-on-text: #111110;
    --link: #8fb4e8; --unread: #7fc79a; --danger: #e08585;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; transition: background .2s, color .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .layout { display: flex; min-height: 100vh; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 264px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 20px 16px 30px; transition: margin-left .25s ease;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar.collapsed { margin-left: -264px; }
  .sidebar-head {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
  }
  .sidebar-title { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; color: var(--section); }
  .sidebar-close {
    width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .sidebar-close:hover { border-color: var(--gold); color: var(--text); }
  .side-block {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 14px;
  }
  .side-block-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--section); margin-bottom: 10px;
  }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 6px 13px; border-radius: 999px; font-size: 13px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface); color: var(--text2);
    user-select: none;
  }
  .chip.on { border-color: var(--chip-on); background: var(--chip-on); color: var(--chip-on-text); font-weight: 600; }
  .side-btn {
    display: block; width: 100%; padding: 10px; margin-bottom: 8px;
    border-radius: 10px; border: 1px solid var(--gold); background: transparent;
    color: var(--gold); font-family: inherit; font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: background .15s, color .15s;
  }
  .side-btn:last-child { margin-bottom: 0; }
  .side-btn:hover { background: var(--gold); color: var(--surface); }

  /* ---------- Main ---------- */
  .main-area { flex: 1; padding: 40px 20px 100px; min-width: 0; }
  .container { max-width: 720px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 30px; position: relative; }
  header h1 { font-weight: 800; font-size: clamp(26px, 6vw, 38px); letter-spacing: 0.02em; }
  .toolbar { position: absolute; top: 0; right: 0; display: flex; gap: 8px; }
  .sidebar-toggle { position: absolute; top: 0; left: 0; }
  .tool-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, color .15s;
  }
  .tool-btn:hover { border-color: var(--gold); color: var(--text); }
  body.dark .tool-btn.theme { border-color: var(--gold); color: var(--text); }

  .search-row { display: flex; gap: 10px; margin-bottom: 22px; }
  .search {
    flex: 1; min-width: 0; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 13px 16px; color: var(--text); font-size: 15px; outline: none;
    font-family: inherit;
  }
  .search:focus { border-color: var(--gold); }
  .add-btn {
    background: var(--chip-on); color: var(--chip-on-text); border: none;
    border-radius: 16px; padding: 0 22px; font-size: 15px; font-weight: 700;
    cursor: pointer; white-space: nowrap; font-family: inherit;
  }

  .form-box { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 22px; }
  label { font-size: 12.5px; color: var(--text2); margin-bottom: 6px; display: block; }
  .inp {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 11px 13px; color: var(--text); font-size: 14px;
    outline: none; margin-bottom: 12px; font-family: inherit;
  }
  .inp:focus { border-color: var(--gold); }
  .detect { margin-top: -6px; margin-bottom: 12px; font-size: 12.5px; color: var(--gold); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; margin-bottom: 14px; }
  .card.seen { opacity: .6; }
  .card-row { display: flex; gap: 12px; align-items: flex-start; }
  .card-main { min-width: 0; flex: 1; }
  .thumb { width: 100%; border-radius: 12px; margin: 4px 0 10px; display: block; }
  .meta { font-size: 12.5px; color: var(--text3); margin-bottom: 8px; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .title { font-size: 16.5px; font-weight: 700; line-height: 1.45; word-break: break-word; }
  .note {
    font-size: 14px; color: var(--text); margin-top: 8px; line-height: 1.6;
    display: inline-block; border: 1px solid var(--gold); border-radius: 10px; padding: 7px 12px;
  }
  .lnk { font-size: 12.5px; color: var(--link); word-break: break-all; display: inline-block; margin-top: 8px; text-decoration: none; }
  .tag {
    display: inline-block; background: var(--bg); color: var(--text2); border: 1px solid var(--border);
    border-radius: 8px; padding: 2px 10px; font-size: 12px; margin-right: 6px; margin-top: 8px; cursor: pointer;
  }
  .small-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text2); border-radius: 10px;
    padding: 5px 12px; font-size: 12.5px; cursor: pointer; margin-left: 8px; white-space: nowrap; font-family: inherit;
  }
  .small-btn.danger { color: var(--danger); }
  .actions { display: flex; flex-wrap: wrap; gap: 6px 0; justify-content: flex-end; flex-shrink: 0; max-width: 42%; }
  .cat-select {
    margin-top: 8px; background: var(--input-bg); border: 1px solid var(--gold);
    color: var(--text); border-radius: 10px; padding: 7px 10px; font-size: 13px; outline: none; font-family: inherit;
  }
  .empty { text-align: center; padding: 60px 20px; color: var(--text2); line-height: 1.8; }
  .count { text-align: center; color: var(--text3); font-size: 12.5px; margin-top: 26px; }
  .check { width: 20px; height: 20px; margin-top: 2px; flex-shrink: 0; accent-color: var(--gold); }
  .pin-mark { color: var(--gold); font-weight: 700; }

  .fab {
    position: fixed; right: 22px; bottom: calc(22px + env(safe-area-inset-bottom));
    width: 58px; height: 58px; border-radius: 50%; z-index: 45;
    border: none; background: var(--gold); color: var(--chip-on-text);
    font-size: 30px; font-weight: 300; line-height: 1; cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,.25); font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s;
  }
  .fab:hover { transform: scale(1.06); }
  .fab.open { transform: rotate(45deg); }

  .batch-bar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: none; justify-content: center; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .batch-bar .small-btn { margin-left: 0; padding: 8px 14px; }
  .batch-bar select { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; font-size: 12.5px; font-family: inherit; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50;
    display: none; align-items: center; justify-content: center; padding: 20px;
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--bg); border: 1px solid var(--border); border-radius: 18px;
    padding: 22px; width: 100%; max-width: 440px; max-height: 82vh; overflow-y: auto;
  }
  .modal h3 { margin: 0 0 14px; font-size: 16px; }
  .cat-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .cat-item span.name { flex: 1; font-size: 14.5px; }
  .cat-item button { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 4px 9px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .cat-item button.danger { color: var(--danger); }

  @media (max-width: 720px) {
    .sidebar { position: fixed; z-index: 60; left: 0; top: 0; box-shadow: 4px 0 20px rgba(0,0,0,.15); }
    .sidebar.collapsed { margin-left: -280px; box-shadow: none; }
  }
</style>
</head>
<body>
<div class="layout">

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar collapsed" id="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">篩選與功能</span>
      <button class="sidebar-close" onclick="toggleSidebar()" aria-label="收合側欄">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="side-block">
      <div class="side-block-label">搜尋</div>
      <input class="search" id="search" placeholder="標題、備註、標籤、分類" style="width:100%;border-radius:12px;padding:11px 13px;font-size:14px;">
    </div>

    <div class="side-block">
      <div class="side-block-label">分類</div>
      <div class="chip-row" id="catFilter"></div>
    </div>

    <div class="side-block">
      <div class="side-block-label">狀態</div>
      <div class="chip-row" id="seenFilter"></div>
    </div>

    <div class="side-block" id="platformBlock">
      <div class="side-block-label">平台</div>
      <div class="chip-row" id="platformFilter"></div>
    </div>

    <div class="side-block">
      <div class="side-block-label">功能</div>
      <button class="side-btn" id="mExport">匯出備份</button>
      <button class="side-btn" id="mSelect">選取模式</button>
      <button class="side-btn" id="mCats">分類管理</button>
      <button class="side-btn" id="mRandom">隨機一則</button>
    </div>
  </aside>

  <!-- ========== MAIN ========== -->
  <div class="main-area">
    <div class="container">
      <header>
        <div class="sidebar-toggle">
          <button class="tool-btn" id="sidebarBtn" onclick="toggleSidebar()" aria-label="篩選與功能">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
          </button>
        </div>
        <div class="toolbar">
          <button class="tool-btn theme" id="themeBtn" aria-label="切換晝夜模式"></button>
        </div>
        <h1>社群收藏庫</h1>
      </header>

      <div class="form-box" id="formBox" style="display:none;">
        <label>貼文連結（YouTube 自動抓標題）</label>
        <input class="inp" id="fUrl" placeholder="https://">
        <div class="detect" id="detect" style="display:none;"></div>
        <label>標題</label>
        <input class="inp" id="fTitle" placeholder="幫這則貼文取個好找的名字">
        <label>備註（選填）</label>
        <input class="inp" id="fNote" placeholder="為什麼存它、重點是什麼">
        <label>分類</label>
        <div class="chip-row" id="catChips" style="margin-bottom:12px;"></div>
        <input class="inp" id="fNewCat" placeholder="或輸入新分類">
        <label>標籤（用逗號分隔）</label>
        <input class="inp" id="fTags" placeholder="貓, 搞笑, 週末想看">
        <div style="display:flex; gap:10px; margin-top:4px;">
          <button class="add-btn" id="saveBtn" style="padding:12px 24px;">存起來</button>
          <button class="small-btn" id="cancelBtn" style="padding:12px 20px; margin-left:0;">取消</button>
        </div>
      </div>

      <div id="list"><div class="empty">載入中…</div></div>
      <div class="count" id="count"></div>
    </div>
  </div>
</div>

<button class="fab" id="toggleForm" aria-label="新增收藏">＋</button>

<div class="batch-bar" id="batchBar">
  <span id="batchCount" style="font-size:13px;color:var(--text2);"></span>
  <button class="small-btn" id="bSeen">標已看</button>
  <button class="small-btn" id="bUnseen">標未看</button>
  <select id="bCat"><option value="">改分類…</option></select>
  <button class="small-btn danger" id="bDel">刪除</button>
  <button class="small-btn" id="bCancel">結束選取</button>
</div>

<div class="overlay" id="catOverlay">
  <div class="modal">
    <h3>分類管理</h3>
    <div id="catList"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <input class="inp" id="newCatName" placeholder="新增分類名稱" style="margin-bottom:0;flex:1;">
      <button class="add-btn" id="addCatBtn" style="padding:0 16px;">新增</button>
    </div>
    <button class="small-btn" id="catClose" style="margin:16px 0 0;padding:9px 18px;">關閉</button>
  </div>
</div>

<div class="overlay" id="randOverlay">
  <div class="modal">
    <h3>隨機回顧</h3>
    <div id="randContent"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="add-btn" id="randAgain" style="padding:10px 18px;">再抽一則</button>
      <button class="small-btn" id="randClose" style="margin-left:0;padding:10px 18px;">關閉</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc, getDoc,
  query, orderBy, serverTimestamp, writeBatch }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXTVIKimcjWv6ehkJUirX3uS883bqq4EE",
  authDomain: "social-bookmark-3baa0.firebaseapp.com",
  projectId: "social-bookmark-3baa0",
  storageBucket: "social-bookmark-3baa0.firebasestorage.app",
  messagingSenderId: "1024576106796",
  appId: "1:1024576106796:web:c04875f80f3b76da63bc89"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const col = collection(db, "bookmarks");
const catsRef = doc(db, "meta", "categories");

const PLATFORMS = { instagram:"Instagram", threads:"Threads", x:"X", youtube:"YouTube", facebook:"Facebook", tiktok:"TikTok", other:"其他" };
function detectPlatform(url){
  const u=(url||"").toLowerCase();
  if(u.includes("instagram.com"))return"instagram";
  if(u.includes("threads."))return"threads";
  if(u.includes("twitter.com")||u.includes("x.com"))return"x";
  if(u.includes("youtube.com")||u.includes("youtu.be"))return"youtube";
  if(u.includes("facebook.com")||u.includes("fb.com"))return"facebook";
  if(u.includes("tiktok.com"))return"tiktok";
  return"other";
}
function ytId(url){
  const m=(url||"").match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([\w-]{11})/);
  return m?m[1]:null;
}
async function fetchYouTubeTitle(url){
  try{ const r=await fetch("https://www.youtube.com/oembed?format=json&url="+encodeURIComponent(url)); if(!r.ok)return null; return (await r.json()).title||null; }catch(e){return null;}
}

const DEFAULT_CATS=["迷因","美食","穿搭","知識","音樂","待看"];
let posts=[], categories=[...DEFAULT_CATS], catsDocLoaded=false, postsLoaded=false;
let query_="", activeCat="全部", activeSeen="全部", activePlatform="全部";
let editingId=null, formCat="";
let selectMode=false, selected=new Set();

const el=id=>document.getElementById(id);
function esc(s){ return (s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* 主題 */
const ICON_MOON='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
const ICON_SUN='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
const themeBtn=el("themeBtn");
function applyTheme(dark){
  document.body.classList.toggle("dark", dark);
  themeBtn.innerHTML = dark?ICON_SUN:ICON_MOON;
}
applyTheme(localStorage.getItem("sbk-theme")==="dark");
themeBtn.onclick=()=>{
  const dark=!document.body.classList.contains("dark");
  localStorage.setItem("sbk-theme", dark?"dark":"light");
  applyTheme(dark);
};

/* 側欄 */
window.toggleSidebar=function(){
  const sb=el("sidebar");
  const collapsed=sb.classList.toggle("collapsed");
  localStorage.setItem("sbk-sidebar", collapsed?"0":"1");
};
if(localStorage.getItem("sbk-sidebar")==="1" && window.innerWidth>720){
  el("sidebar").classList.remove("collapsed");
}

/* 登入 + 同步 */
onAuthStateChanged(auth, user=>{
  if(!user) return;
  onSnapshot(query(col, orderBy("createdAt","desc")), snap=>{
    posts=snap.docs.map(d=>({id:d.id,...d.data()}));
    postsLoaded=true; ensureCatsDoc(); render();
  }, err=>{ el("list").innerHTML='<div class="empty">連線失敗：'+esc(err.message)+'</div>'; });
  onSnapshot(catsRef, snap=>{
    if(snap.exists() && Array.isArray(snap.data().list)){ categories=snap.data().list; catsDocLoaded=true; }
    ensureCatsDoc(); render();
  }, err=>console.error(err));
});
signInAnonymously(auth).catch(e=>{ el("list").innerHTML='<div class="empty">登入失敗：'+esc(e.message)+'</div>'; });

let ensuring=false;
async function ensureCatsDoc(){
  if(catsDocLoaded || !postsLoaded || ensuring) return;
  ensuring=true;
  try{
    const snap=await getDoc(catsRef);
    if(!snap.exists()){
      const s=new Set(DEFAULT_CATS);
      posts.forEach(p=>{ if(p.category) s.add(p.category); });
      await setDoc(catsRef,{list:[...s]});
    }
  }catch(e){ console.error(e); }
  ensuring=false;
}
async function saveCats(list){
  categories=list;
  try{ await setDoc(catsRef,{list}); }catch(e){ alert("分類儲存失敗："+e.message); }
}

/* 表單 */
const formBox=el("formBox");
el("toggleForm").onclick=()=>{
  const show=formBox.style.display==="none";
  resetForm();
  formBox.style.display=show?"block":"none";
  el("toggleForm").classList.toggle("open", show);
  if(show) window.scrollTo({top:0,behavior:"smooth"});
};
el("cancelBtn").onclick=resetForm;
el("fUrl").addEventListener("input", async e=>{
  const url=e.target.value.trim(); const d=el("detect");
  if(url){ d.style.display="block"; d.textContent="辨識為 "+PLATFORMS[detectPlatform(url)]; } else d.style.display="none";
  if(ytId(url) && !el("fTitle").value.trim()){ const t=await fetchYouTubeTitle(url); if(t && !el("fTitle").value.trim()) el("fTitle").value=t; }
});
el("search").addEventListener("input", e=>{ query_=e.target.value; render(); });
el("saveBtn").onclick=savePost;

function resetForm(){
  editingId=null; formCat="";
  ["fUrl","fTitle","fNote","fNewCat","fTags"].forEach(i=>el(i).value="");
  el("detect").style.display="none"; el("saveBtn").textContent="存起來";
  formBox.style.display="none"; el("toggleForm").classList.remove("open"); renderCatChips();
}
function startEdit(p){
  editingId=p.id; formCat=p.category||"";
  el("fUrl").value=p.url||""; el("fTitle").value=p.title||""; el("fNote").value=p.note||"";
  el("fNewCat").value=""; el("fTags").value=(p.tags||[]).join(", ");
  el("saveBtn").textContent="儲存變更"; formBox.style.display="block"; el("toggleForm").classList.add("open");
  renderCatChips(); window.scrollTo({top:0,behavior:"smooth"});
}
async function savePost(){
  const url=el("fUrl").value.trim(); const title=el("fTitle").value.trim()||url;
  if(!url && !title) return;
  const newCat=el("fNewCat").value.trim(); const cat=newCat||formCat;
  const tags=el("fTags").value.split(/[,，、]/).map(t=>t.trim()).filter(Boolean);
  const data={ url, title, note:el("fNote").value.trim(), category:cat, tags, platform:detectPlatform(url) };
  el("saveBtn").disabled=true;
  try{
    if(newCat && !categories.includes(newCat)) await saveCats([...categories,newCat]);
    if(editingId){ await updateDoc(doc(db,"bookmarks",editingId), data); }
    else{ await addDoc(col, {...data, seen:false, pinned:false, createdAt:serverTimestamp()}); }
    resetForm();
  }catch(e){ alert("儲存失敗："+e.message); }
  el("saveBtn").disabled=false;
}
async function setCategory(id,cat){ try{ await updateDoc(doc(db,"bookmarks",id),{category:cat}); }catch(e){alert(e.message);} }
async function toggleSeen(id,seen){ try{ await updateDoc(doc(db,"bookmarks",id),{seen:!seen}); }catch(e){alert(e.message);} }
async function togglePin(id,pinned){ try{ await updateDoc(doc(db,"bookmarks",id),{pinned:!pinned}); }catch(e){alert(e.message);} }
async function removePost(id){ if(!confirm("確定刪除這則收藏？"))return; try{ await deleteDoc(doc(db,"bookmarks",id)); }catch(e){alert(e.message);} }

/* 匯出 */
el("mExport").onclick=()=>{
  const data=posts.map(p=>({...p, createdAt:p.createdAt&&p.createdAt.seconds?new Date(p.createdAt.seconds*1000).toISOString():null}));
  const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),categories,posts:data},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  const d=new Date();
  a.download="social-bookmark-backup-"+d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+".json";
  a.click(); URL.revokeObjectURL(a.href);
};

/* 選取模式 */
el("mSelect").onclick=()=>setSelectMode(true);
el("bCancel").onclick=()=>setSelectMode(false);
function setSelectMode(on){ selectMode=on; selected.clear(); el("batchBar").style.display=on?"flex":"none"; render(); }
function updateBatchBar(){
  el("batchCount").textContent="已選 "+selected.size+" 則";
  el("bCat").innerHTML='<option value="">改分類…</option><option value="__clear__">清除分類</option>'+categories.map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join("");
}
async function batchUpdate(fields){
  if(selected.size===0){ alert("尚未選取任何貼文"); return; }
  const b=writeBatch(db); selected.forEach(id=>b.update(doc(db,"bookmarks",id),fields));
  try{ await b.commit(); setSelectMode(false); }catch(e){ alert("批次操作失敗："+e.message); }
}
el("bSeen").onclick=()=>batchUpdate({seen:true});
el("bUnseen").onclick=()=>batchUpdate({seen:false});
el("bCat").onchange=e=>{ const v=e.target.value; if(!v)return; batchUpdate({category:v==="__clear__"?"":v}); e.target.value=""; };
el("bDel").onclick=async()=>{
  if(selected.size===0){ alert("尚未選取任何貼文"); return; }
  if(!confirm("確定刪除選取的 "+selected.size+" 則收藏？")) return;
  const b=writeBatch(db); selected.forEach(id=>b.delete(doc(db,"bookmarks",id)));
  try{ await b.commit(); setSelectMode(false); }catch(e){ alert("刪除失敗："+e.message); }
};

/* 分類管理 */
el("mCats").onclick=()=>{ renderCatManage(); el("catOverlay").style.display="flex"; };
el("catClose").onclick=()=>{ el("catOverlay").style.display="none"; };
el("addCatBtn").onclick=async()=>{
  const name=el("newCatName").value.trim(); if(!name) return;
  if(categories.includes(name)){ alert("已有同名分類"); return; }
  await saveCats([...categories,name]); el("newCatName").value=""; renderCatManage();
};
function renderCatManage(){
  const box=el("catList"); box.innerHTML="";
  categories.forEach((c,i)=>{
    const row=document.createElement("div"); row.className="cat-item";
    row.innerHTML='<span class="name">'+esc(c)+'</span><button data-up>上移</button><button data-down>下移</button><button data-ren>改名</button><button data-del class="danger">刪除</button>';
    row.querySelector("[data-up]").onclick=async()=>{ if(i===0)return; const l=[...categories]; [l[i-1],l[i]]=[l[i],l[i-1]]; await saveCats(l); renderCatManage(); };
    row.querySelector("[data-down]").onclick=async()=>{ if(i===categories.length-1)return; const l=[...categories]; [l[i+1],l[i]]=[l[i],l[i+1]]; await saveCats(l); renderCatManage(); };
    row.querySelector("[data-ren]").onclick=async()=>{
      const name=prompt("新的分類名稱",c); if(!name||name.trim()===""||name.trim()===c) return;
      const n=name.trim(); if(categories.includes(n)){ alert("已有同名分類"); return; }
      await saveCats(categories.map(x=>x===c?n:x));
      const b=writeBatch(db); posts.filter(p=>p.category===c).forEach(p=>b.update(doc(db,"bookmarks",p.id),{category:n}));
      try{ await b.commit(); }catch(e){ alert("貼文分類更新失敗："+e.message); }
      renderCatManage();
    };
    row.querySelector("[data-del]").onclick=async()=>{
      if(!confirm('刪除分類「'+c+'」？該分類的貼文會變成待整理（未分類）')) return;
      await saveCats(categories.filter(x=>x!==c));
      const b=writeBatch(db); posts.filter(p=>p.category===c).forEach(p=>b.update(doc(db,"bookmarks",p.id),{category:""}));
      try{ await b.commit(); }catch(e){ alert("貼文分類清除失敗："+e.message); }
      renderCatManage();
    };
    box.appendChild(row);
  });
  if(categories.length===0) box.innerHTML='<div style="color:var(--text2);font-size:13.5px;padding:8px 0;">目前沒有分類</div>';
}

/* 隨機 */
el("mRandom").onclick=showRandom;
el("randAgain").onclick=showRandom;
el("randClose").onclick=()=>{ el("randOverlay").style.display="none"; };
function showRandom(){
  if(posts.length===0){ alert("還沒有任何收藏"); return; }
  const p=posts[Math.floor(Math.random()*posts.length)]; const yid=ytId(p.url);
  el("randContent").innerHTML=
    (yid?'<img class="thumb" src="https://i.ytimg.com/vi/'+yid+'/hqdefault.jpg" alt="">':"")+
    '<div class="meta">'+(PLATFORMS[p.platform]||"其他")+' · '+fmtDate(p.createdAt)+(p.category?' · <span style="color:var(--gold);">'+esc(p.category)+'</span>':'')+'</div>'+
    '<div class="title">'+esc(p.title)+'</div>'+
    (p.note?'<div class="note">'+esc(p.note)+'</div>':'')+
    (p.url?'<a class="lnk" href="'+esc(p.url)+'" target="_blank" rel="noreferrer">'+esc(p.url)+'</a>':'');
  el("randOverlay").style.display="flex";
}

/* 渲染 */
function renderCatChips(){
  const box=el("catChips"); box.innerHTML="";
  categories.forEach(c=>{
    const s=document.createElement("span");
    s.className="chip"+((formCat===c && !el("fNewCat").value.trim())?" on":"");
    s.textContent=c; s.onclick=()=>{ formCat=c; el("fNewCat").value=""; renderCatChips(); };
    box.appendChild(s);
  });
}
function chipInto(box, items, active, onPick){
  box.innerHTML="";
  items.forEach(it=>{
    const val=typeof it==="object"?it.val:it; const lab=typeof it==="object"?it.lab:it;
    const s=document.createElement("span"); s.className="chip"+(active===val?" on":""); s.textContent=lab;
    s.onclick=()=>onPick(val); box.appendChild(s);
  });
}
function fmtDate(ts){ let d; if(ts&&ts.seconds) d=new Date(ts.seconds*1000); else if(ts) d=new Date(ts); else return ""; return d.getFullYear()+"/"+(d.getMonth()+1)+"/"+d.getDate(); }

function render(){
  const pendingCount=posts.filter(p=>!p.category).length;
  chipInto(el("catFilter"), ["全部",{val:"__pending__",lab:"待整理"+(pendingCount?"（"+pendingCount+"）":"")},...categories], activeCat, v=>{activeCat=v;render();});
  chipInto(el("seenFilter"), [{val:"全部",lab:"全部"},{val:"未看",lab:"未看"},{val:"已看",lab:"已看"}], activeSeen, v=>{activeSeen=v;render();});
  const used=[...new Set(posts.map(p=>p.platform))];
  el("platformBlock").style.display=used.length?"block":"none";
  chipInto(el("platformFilter"), [{val:"全部",lab:"全部"},...used.map(pk=>({val:pk,lab:PLATFORMS[pk]||pk}))], activePlatform, v=>{activePlatform=v;render();});

  const q=query_.trim().toLowerCase();
  let filtered=posts.filter(p=>{
    if(activeCat==="__pending__"){ if(p.category) return false; }
    else if(activeCat!=="全部" && p.category!==activeCat) return false;
    if(activePlatform!=="全部" && p.platform!==activePlatform) return false;
    if(activeSeen==="未看" && p.seen) return false;
    if(activeSeen==="已看" && !p.seen) return false;
    if(!q) return true;
    return [p.title,p.note,p.url,p.category,...(p.tags||[])].join(" ").toLowerCase().includes(q);
  });
  filtered=[...filtered].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));

  const list=el("list");
  if(filtered.length===0){
    list.innerHTML='<div class="empty">'+(posts.length===0?"還沒有收藏。點右下角的＋，或用 iOS 捷徑分享貼文進來。":"找不到符合的貼文，換個關鍵字或篩選條件試試。")+'</div>';
  }else{
    list.innerHTML="";
    filtered.forEach(p=>{
      const card=document.createElement("div"); card.className="card"+(p.seen?" seen":"");
      const yid=ytId(p.url);
      const catSelect = !p.category ? '<div><select class="cat-select" data-catsel><option value="">選擇分類…</option>'+categories.map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join("")+'</select></div>' : "";
      card.innerHTML=
        '<div class="card-row">'+
        (selectMode?'<input type="checkbox" class="check" data-check'+(selected.has(p.id)?" checked":"")+'>':"")+
        '<div class="card-main">'+
          '<div class="meta">'+
            (p.pinned?'<span class="pin-mark">置頂 · </span>':"")+
            '<span class="dot" style="background:'+(p.seen?"var(--text3)":"var(--unread)")+'"></span>'+
            '<span style="color:'+(p.seen?"var(--text3)":"var(--unread)")+';font-weight:600;">'+(p.seen?"已看":"未看")+'</span>'+
            '<span> · '+(PLATFORMS[p.platform]||"其他")+' · '+fmtDate(p.createdAt)+'</span>'+
            (p.category?'<span style="color:var(--gold);"> · '+esc(p.category)+'</span>':'<span style="color:var(--gold);"> · 待整理</span>')+
          '</div>'+
          (yid?'<img class="thumb" loading="lazy" src="https://i.ytimg.com/vi/'+yid+'/hqdefault.jpg" alt="">':"")+
          '<div class="title">'+esc(p.title)+'</div>'+
          (p.note?'<div class="note">'+esc(p.note)+'</div>':'')+
          (p.url?'<a class="lnk" href="'+esc(p.url)+'" target="_blank" rel="noreferrer">'+esc(p.url)+'</a>':'')+
          (p.tags&&p.tags.length?'<div>'+p.tags.map(t=>'<span class="tag" data-tag="'+esc(t)+'">#'+esc(t)+'</span>').join('')+'</div>':'')+
          catSelect+
        '</div>'+
        (!selectMode?
        '<div class="actions">'+
          '<button class="small-btn" data-pin style="margin-left:0;">'+(p.pinned?"取消置頂":"置頂")+'</button>'+
          '<button class="small-btn" data-seen>'+(p.seen?"標為未看":"標為已看")+'</button>'+
          '<button class="small-btn" data-edit>編輯</button>'+
          '<button class="small-btn danger" data-del>刪除</button>'+
        '</div>':"")+
        '</div>';
      list.appendChild(card);
      card.querySelectorAll("[data-tag]").forEach(t=>t.onclick=()=>{el("search").value=t.dataset.tag;query_=t.dataset.tag;render();});
      const sel=card.querySelector("[data-catsel]"); if(sel) sel.onchange=e=>{ if(e.target.value) setCategory(p.id,e.target.value); };
      if(selectMode){
        card.querySelector("[data-check]").onchange=e=>{ if(e.target.checked) selected.add(p.id); else selected.delete(p.id); updateBatchBar(); };
      }else{
        card.querySelector("[data-pin]").onclick=()=>togglePin(p.id,p.pinned);
        card.querySelector("[data-seen]").onclick=()=>toggleSeen(p.id,p.seen);
        card.querySelector("[data-edit]").onclick=()=>startEdit(p);
        card.querySelector("[data-del]").onclick=()=>removePost(p.id);
      }
    });
  }
  el("count").textContent = posts.length?("共 "+posts.length+" 則收藏 · 顯示 "+filtered.length+" 則"):"";
  if(selectMode) updateBatchBar();
}
</script>
</body>
</html>
